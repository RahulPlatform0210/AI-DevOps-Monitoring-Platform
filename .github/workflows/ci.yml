name: AI DevOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  backend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify Docker Installation
        run: docker --version

      - name: Build Docker Image
        run: |
          docker build -t ai-devops-monitor .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image to Docker Hub
        run: |
          docker tag ai-devops-monitor rahulplatform0210/ai-devops-monitor:latest
          docker push rahulplatform0210/ai-devops-monitor:latest

      - name: CI Pipeline Success
        run: echo "AI DevOps CI Pipeline executed successfully 🚀"



